<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  >

  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js">
  </script>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }

    #ativarMovimento {
      position: fixed;
      z-index: 10;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      padding: 14px 22px;
      border: none;
      border-radius: 999px;
      background: #111;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #status {
      position: fixed;
      z-index: 10;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      font-size: 13px;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div id="status">Toque no botão e movimente o celular</div>

  <button id="ativarMovimento">
    Ativar movimento
  </button>

  <model-viewer
    id="modelo"
    src="./3DModel.glb"
    alt="Modelo 3D"
    camera-controls
    disable-pan
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    camera-orbit="0deg 75deg auto"
    min-camera-orbit="-35deg 55deg auto"
    max-camera-orbit="35deg 95deg auto">
  </model-viewer>

  <script>
    const modelo = document.getElementById("modelo");
    const botao = document.getElementById("ativarMovimento");
    const status = document.getElementById("status");

    let movimentoAtivo = false;

    let betaInicial = null;
    let gammaInicial = null;

    let anguloHorizontalAtual = 0;
    let anguloVerticalAtual = 75;

    let anguloHorizontalAlvo = 0;
    let anguloVerticalAlvo = 75;

    const intensidadeHorizontal = 2.4;
    const intensidadeVertical = 1.6;

    const limiteHorizontal = 30;
    const limiteVerticalMinimo = 55;
    const limiteVerticalMaximo = 95;

    function limitar(valor, minimo, maximo) {
      return Math.min(Math.max(valor, minimo), maximo);
    }

    function tratarOrientacao(evento) {
      if (!movimentoAtivo) return;

      const beta = evento.beta;
      const gamma = evento.gamma;

      if (beta === null || gamma === null) {
        status.textContent = "O aparelho não forneceu dados do giroscópio";
        return;
      }

      if (betaInicial === null || gammaInicial === null) {
        betaInicial = beta;
        gammaInicial = gamma;
        status.textContent = "Movimento ativado";
      }

      const movimentoVertical = beta - betaInicial;
      const movimentoHorizontal = gamma - gammaInicial;

      anguloHorizontalAlvo = limitar(
        movimentoHorizontal * intensidadeHorizontal,
        -limiteHorizontal,
        limiteHorizontal
      );

      anguloVerticalAlvo = limitar(
        75 + movimentoVertical * intensidadeVertical,
        limiteVerticalMinimo,
        limiteVerticalMaximo
      );
    }

    function animar() {
      const suavidade = 0.14;

      anguloHorizontalAtual +=
        (anguloHorizontalAlvo - anguloHorizontalAtual) * suavidade;

      anguloVerticalAtual +=
        (anguloVerticalAlvo - anguloVerticalAtual) * suavidade;

      modelo.cameraOrbit =
        `${anguloHorizontalAtual}deg ` +
        `${anguloVerticalAtual}deg auto`;

      requestAnimationFrame(animar);
    }

    async function ativarMovimento() {
      try {
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const permissao =
            await DeviceOrientationEvent.requestPermission();

          if (permissao !== "granted") {
            status.textContent = "Permissão de movimento negada";
            return;
          }
        }

        betaInicial = null;
        gammaInicial = null;
        movimentoAtivo = true;

        window.addEventListener(
          "deviceorientation",
          tratarOrientacao,
          true
        );

        botao.style.display = "none";
        status.textContent = "Movimente o celular";

      } catch (erro) {
        console.error(erro);
        status.textContent = "Não foi possível ativar o movimento";
      }
    }

    botao.addEventListener("click", ativarMovimento);

    animar();
  </script>

</body>
</html>
