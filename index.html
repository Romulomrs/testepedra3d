<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  >

  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js">
  </script>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }

    #ativarMovimento {
      position: fixed;
      z-index: 10;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      padding: 14px 22px;
      border: none;
      border-radius: 999px;
      background: #111;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #status {
      position: fixed;
      z-index: 10;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      font-size: 13px;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>

<body>

  <div id="status">
    Toque no botão e movimente o celular
  </div>

  <button id="ativarMovimento">
    Ativar movimento
  </button>

  <model-viewer
    id="modelo"
    src="./3DModel.glb"
    alt="Modelo 3D"
    camera-controls
    disable-pan
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    camera-orbit="0deg 75deg auto">
  </model-viewer>

  <script>
    const modelo = document.getElementById("modelo");
    const botao = document.getElementById("ativarMovimento");
    const status = document.getElementById("status");

    let movimentoAtivo = false;
    let sensorRecebido = false;

    let alphaAnterior = null;
    let betaInicial = null;

    let rotacaoAcumulada = 0;

    let anguloHorizontalAtual = 0;
    let anguloVerticalAtual = 75;

    let anguloHorizontalAlvo = 0;
    let anguloVerticalAlvo = 75;

    /*
      Aumente estes valores para mais sensibilidade.
    */
    const intensidadeHorizontal = 2.4;
    const intensidadeVertical = 1.6;

    const limiteVerticalMinimo = 35;
    const limiteVerticalMaximo = 145;

    const suavidade = 0.14;

    function limitar(valor, minimo, maximo) {
      return Math.min(Math.max(valor, minimo), maximo);
    }

    function tratarOrientacao(evento) {
      if (!movimentoAtivo) return;

      const alpha = evento.alpha;
      const beta = evento.beta;

      if (alpha === null || beta === null) {
        status.textContent =
          "O aparelho não forneceu dados de orientação";
        return;
      }

      sensorRecebido = true;

      /*
        Primeira leitura: define a posição inicial.
      */
      if (alphaAnterior === null || betaInicial === null) {
        alphaAnterior = alpha;
        betaInicial = beta;

        status.textContent = "Movimento ativado";
        return;
      }

      /*
        Calcula quanto o celular girou desde a leitura anterior.
      */
      let diferencaAlpha = alpha - alphaAnterior;

      /*
        Corrige a passagem entre 359° e 0°.

        Exemplo:
        359° para 1° não deve ser -358°,
        e sim aproximadamente +2°.
      */
      if (diferencaAlpha > 180) {
        diferencaAlpha -= 360;
      }

      if (diferencaAlpha < -180) {
        diferencaAlpha += 360;
      }

      /*
        Acumula a rotação.

        Isso permite:
        360°, 720°, 1080° e assim por diante.
      */
      rotacaoAcumulada += diferencaAlpha;

      alphaAnterior = alpha;

      const movimentoVertical = beta - betaInicial;

      /*
        O sinal negativo pode ser invertido caso
        o movimento horizontal fique ao contrário.
      */
      anguloHorizontalAlvo =
        -rotacaoAcumulada * intensidadeHorizontal;

      anguloVerticalAlvo = limitar(
        75 + movimentoVertical * intensidadeVertical,
        limiteVerticalMinimo,
        limiteVerticalMaximo
      );
    }

    function animar() {
      anguloHorizontalAtual +=
        (anguloHorizontalAlvo - anguloHorizontalAtual) *
        suavidade;

      anguloVerticalAtual +=
        (anguloVerticalAlvo - anguloVerticalAtual) *
        suavidade;

      modelo.cameraOrbit =
        `${anguloHorizontalAtual}deg ` +
        `${anguloVerticalAtual}deg auto`;

      requestAnimationFrame(animar);
    }

    async function ativarMovimento() {
      try {
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission ===
            "function"
        ) {
          const permissao =
            await DeviceOrientationEvent.requestPermission();

          if (permissao !== "granted") {
            status.textContent =
              "Permissão de movimento negada";
            return;
          }
        }

        alphaAnterior = null;
        betaInicial = null;

        rotacaoAcumulada = 0;

        anguloHorizontalAtual = 0;
        anguloHorizontalAlvo = 0;

        anguloVerticalAtual = 75;
        anguloVerticalAlvo = 75;

        sensorRecebido = false;
        movimentoAtivo = true;

        window.addEventListener(
          "deviceorientation",
          tratarOrientacao,
          true
        );

        botao.style.display = "none";
        status.textContent = "Movimente o celular";

        setTimeout(() => {
          if (!sensorRecebido) {
            status.textContent =
              "Abra no Chrome ou Safari e permita os sensores";
          }
        }, 2500);

      } catch (erro) {
        console.error(erro);

        status.textContent =
          "Não foi possível ativar o movimento";
      }
    }

    botao.addEventListener(
      "click",
      ativarMovimento
    );

    animar();
  </script>

</body>
</html>
